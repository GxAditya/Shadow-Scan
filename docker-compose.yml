services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/malware_analysis
      - SESSION_SECRET=change-this-in-production
      - UPLOAD_FOLDER=/tmp/uploads
      - MAX_CONTENT_LENGTH=10485760
      - DEBUG=False
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=malware_analysis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d malware_analysis"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
